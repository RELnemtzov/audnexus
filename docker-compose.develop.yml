services:
  node-server:
    image: ghcr.io/laxamentumtech/audnexus:develop@sha256:b172561cab2748c0aeff5d7e2ca55ae0cbba2e35f2c1e0433a1f1ac03a585aaf
    restart: always
    environment:
      ADP_TOKEN: ${ADP_TOKEN}
      MAX_REQUESTS: ${MAX_REQUESTS:-300}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/audnexus}
      PRIVATE_KEY: ${PRIVATE_KEY}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      UPDATE_INTERVAL: ${UPDATE_INTERVAL:-30}
      UPDATE_THRESHOLD: ${UPDATE_THRESHOLD:-7}
    ports:
      - '3000:3000'
    depends_on:
      - mongo
      - redis
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://127.0.0.1:3000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mongo:
    image: mongo:7.0.37@sha256:8ecb514b00bdcc0bde67ef4e6c330385377a9dc68e24ee94e28c07c891647348
    restart: always
    volumes:
      - /mnt/docker/mongo/data:/data/db
    networks:
      - internal
    ports:
      - '127.0.0.1:27017:27017'

  redis:
    image: redis:8.6-alpine@sha256:2cc044fc5a07c9b701f8f1255a309ae9ad7856e694ac03513bf3648c01e40763
    restart: always
    networks:
      - internal
    ports:
      - '127.0.0.1:6379:6379'

networks:
  internal:
